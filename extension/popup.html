<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
      padding: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .input-group input:focus { border-color: #00a1d6; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #00a1d6; color: white; }
    .btn-primary:hover { background: #0090c0; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-copy { background: #f0f0f0; color: #333; font-size: 12px; padding: 4px 10px; }
    .btn-copy:hover { background: #e0e0e0; }
    .btn-save { background: #52c41a; color: white; font-size: 12px; padding: 4px 10px; }
    .btn-save:hover { background: #49b018; }
    .btn-delete { background: #ff4d4f; color: white; font-size: 12px; padding: 4px 10px; }
    .btn-delete:hover { background: #ff7875; }
    .btn-retry { background: #fa8c16; color: white; font-size: 12px; padding: 4px 10px; }
    .btn-retry:hover { background: #d46b08; }
    .status-bar {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-pending { background: #fff7e6; color: #d48806; }
    .status-downloading { background: #e6f7ff; color: #1890ff; }
    .status-transcribing { background: #f0f5ff; color: #2f54eb; }
    .status-completed { background: #f6ffed; color: #389e0d; }
    .status-error { background: #fff2f0; color: #cf1322; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-pending { background: #d48806; }
    .dot-downloading { background: #1890ff; animation: pulse 1s infinite; }
    .dot-transcribing { background: #2f54eb; animation: pulse 1s infinite; }
    .dot-completed { background: #389e0d; }
    .dot-error { background: #cf1322; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .progress-bar {
      height: 4px;
      background: #f0f0f0;
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .fill-downloading { background: #1890ff; width: 60%; animation: progress-slide 2s infinite; }
    .fill-transcribing { background: #2f54eb; width: 80%; animation: progress-slide 2s infinite; }
    .fill-completed { background: #389e0d; width: 100%; }
    .fill-error { background: #cf1322; width: 100%; }
    @keyframes progress-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(150%); }
    }
    .toast {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast-success { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
    .toast-error { background: #fff2f0; color: #cf1322; border: 1px solid #ffa39e; }
    .video-card {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .video-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .video-url {
      font-size: 12px;
      color: #666;
      word-break: break-all;
      margin-bottom: 8px;
    }
    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .field-name {
      font-size: 12px;
      color: #666;
    }
    .field-pending {
      font-size: 11px;
      color: #bbb;
      font-style: italic;
    }
    .field-preview {
      font-size: 11px;
      color: #999;
      margin-bottom: 8px;
      padding-left: 8px;
      border-left: 2px solid #eee;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-group { display: flex; gap: 6px; }
    .empty-state { text-align: center; padding: 40px; color: #999; }
    .refresh-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .refresh-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="header">
    <h1>MediaAnalytics</h1>
    <button class="refresh-btn" id="refreshBtn">刷新</button>
  </div>

  <div class="input-group">
    <input type="text" id="urlInput" placeholder="粘贴 B站视频链接..." />
    <button class="btn btn-primary" id="addBtn">添加</button>
  </div>

  <div id="videoList"></div>

  <details style="margin-top:12px;border-top:1px solid #eee;padding-top:8px;">
    <summary style="cursor:pointer;font-size:11px;color:#999;">调试日志</summary>
    <pre id="debugLog" style="font-size:10px;color:#666;background:#f5f5f5;padding:8px;border-radius:4px;max-height:200px;overflow-y:auto;white-space:pre-wrap;margin-top:4px;"></pre>
  </details>

  <script src="popup.js"></script>
</body>
</html>
